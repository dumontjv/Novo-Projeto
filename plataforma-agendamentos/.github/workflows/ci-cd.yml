name: ci-cd-agendamentos

on:
  push:
    branches: ["main"]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build backend
        working-directory: plataforma-agendamentos/backend
        run: mvn -B clean package

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        working-directory: plataforma-agendamentos/frontend
        run: npm install
      - name: Build frontend
        working-directory: plataforma-agendamentos/frontend
        run: npm run build
